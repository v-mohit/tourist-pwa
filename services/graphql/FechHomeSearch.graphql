query FetchHomeSearch(
  $searchKey: String
  $page: Int = 1
  $pageSize: Int = 999
) {
  places(
    pagination: { page: $page, pageSize: $pageSize }
    filters: {
      or: [
        { name: { contains: $searchKey } }
        { city: { name: { contains: $searchKey } } }
      ]
    }
  ) {
    data {
    id
      attributes {
        name

        placeDetail {
          data {
          id
            attributes {
              slug
            }
          }
        }

        categories {
          data {
            attributes {
              Name

              icon {
                data {
                  attributes {
                    url
                  }
                }
              }
            }
          }
        }

        city {
          data {
            attributes {
              name
              image {
                data {
                  attributes {
                    url
                  }
                }
              }
              cityDetail {
                data {
                  attributes {
                    slug

                    city {
                      data {
                        attributes {
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          }
        }
      }
    }
  }
}
